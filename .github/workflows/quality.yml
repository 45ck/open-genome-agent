name: quality

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: noslop check --tier=fast --pack python --no-spell
      - run: noslop check --tier=slow --pack python
      - run: npm run ci
